<!DOCTYPE html>
<html>
<head>
<style>

body {
  margin: 0;
}

/* contenedor EXACTO */
.card {
  position: relative;
  width: 860px;
  height: 540px;
  font-family: Arial;
}

/* fondo */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* FOTO PRINCIPAL */
.photo {
  position: absolute;
  top: 150px;
  left: 90px;
  width: 180px;
  height: 230px;
  object-fit: cover;
}

/* TEXTO */
.text {
  position: absolute;
  top: 180px;
  left: 300px;
  color: #000;
}

.text h2 {
  margin: 0;
  font-size: 22px;
}

.text p {
  margin-top: 10px;
  font-size: 16px;
}

</style>
</head>

<body>

<div class="card">

  <img src="front.png" class="bg">

  <img src="{{foto}}" class="photo">

  <div class="text">
    <h2>{{nombre}}</h2>
    <h2>{{paterno}}</h2>
    <h2>{{materno}}</h2>
    <p>{{curp}}</p>
  </div>

</div>

</body>
</html>
